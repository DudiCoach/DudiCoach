name: CI/CD

on:
  push:
    branches:
      - main
      - firebase_testing
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Unit and integration tests
        run: npx vitest run

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/firebase_testing') && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Write Firebase service account key
        run: printf '%s' "$FIREBASE_SA_KEY" > /tmp/firebase-sa-key.json
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DUDICOACH_APP }}
      - name: Deploy to Firebase
        run: firebase deploy --project dudicoach-app --only firestore:rules,firestore:indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa-key.json
